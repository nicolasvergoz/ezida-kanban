name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Gofmt check
        run: |
          diff="$(gofmt -d $(find . -name '*.go' -not -path './vendor/*'))"
          if [ -n "${diff}" ]; then
            echo "::error::gofmt drift detected"
            printf '%s\n' "${diff}"
            exit 1
          fi

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck install.sh
        run: shellcheck -s sh scripts/install.sh
