name: pages

# Prerequisite (one-time): repo Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "kanban.toml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build ezida
        run: go build -o ezida ./cmd/ezida

      - name: Export demo board snapshot
        run: ./ezida export --json > site/demo/board.json

      - name: Substitute snapshot SHA into demo banner
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          sed -i "s/__SNAPSHOT_SHA__/${short_sha}/g" site/demo/index.html
          if grep -q __SNAPSHOT_SHA__ site/demo/index.html; then
            echo "::error::placeholder __SNAPSHOT_SHA__ still present after substitution"
            exit 1
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
