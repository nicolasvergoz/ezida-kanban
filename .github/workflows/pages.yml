name: pages

# Prerequisite (one-time): repo Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "kanban.toml"
      - "docs/assets/screenshot.png"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build ezida
        run: go build -o ezida ./cmd/ezida

      - name: Sync landing screenshot from docs/
        run: cp docs/assets/screenshot.png site/assets/screenshot-light.png

      - name: Patch screenshot dimensions in index.html
        run: |
          set -eu
          read w h < <(python3 -c "import struct; \
            d=open('site/assets/screenshot-light.png','rb').read(24); \
            w,h=struct.unpack('>II', d[16:24]); print(w, h)")
          sed -i -E "s|(src=\"assets/screenshot-light\.png\")[[:space:]]+width=\"[0-9]+\"[[:space:]]+height=\"[0-9]+\"|\1 width=\"${w}\" height=\"${h}\"|" site/index.html
          grep -q "src=\"assets/screenshot-light.png\" width=\"${w}\" height=\"${h}\"" site/index.html \
            || { echo "::error::failed to patch screenshot dimensions"; exit 1; }

      - name: Export demo board snapshot
        run: ./ezida export --json > site/demo/board.json

      - name: Substitute snapshot SHA into demo banner
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          sed -i "s/__SNAPSHOT_SHA__/${short_sha}/g" site/demo/index.html
          if grep -q __SNAPSHOT_SHA__ site/demo/index.html; then
            echo "::error::placeholder __SNAPSHOT_SHA__ still present after substitution"
            exit 1
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
