<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ezida</title>
  <link rel="stylesheet" href="/static/style.css">
  <script defer src="/static/app.js"></script>
  <script defer src="/static/vendor/alpine.min.js"></script>
  <script defer src="/static/vendor/sortable.min.js"></script>
</head>
<body>
  <main x-data="board()" x-init="init(); initTheme(); load()">
  <header class="topbar">
    <span class="brand t-brand" x-text="project_name">Ezida</span>
    <div class="topbar-right">
      <div class="filter-wrap">
        <button type="button"
                class="topbar-btn filter-btn"
                :class="{ 'state-active': filter !== '' }"
                @click="filterOpen ? (filterOpen = false) : openFilter()"
                aria-label="Filter cards">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <span>Filter</span>
          <span class="t-mono-counter filter-badge"
                x-show="filter.trim() !== ''"
                x-text="cards.filter(c => filterMatches(c)).length"></span>
        </button>
        <div class="filter-popover"
             x-show="filterOpen"
             x-cloak
             @click.outside="filterOpen = false"
             @keydown.escape.window="filterOpen = false">
          <label class="t-mono-label" for="filter-input">FILTER CARDS</label>
          <input id="filter-input"
                 type="text"
                 x-ref="filterInput"
                 x-model="filter"
                 placeholder="Type to filter...">
          <a class="clear-link"
             href="#"
             x-show="filter !== ''"
             @click.prevent="filter = ''">Clear filter</a>
        </div>
      </div>
      <div class="theme-toggle" role="group" aria-label="Theme">
        <button type="button"
                data-theme-choice="light"
                :aria-pressed="theme === 'light'"
                @click="setTheme('light')"
                title="Light theme">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </button>
        <button type="button"
                data-theme-choice="system"
                :aria-pressed="theme === 'system'"
                @click="setTheme('system')"
                title="System theme">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
        </button>
        <button type="button"
                data-theme-choice="dark"
                :aria-pressed="theme === 'dark'"
                @click="setTheme('dark')"
                title="Dark theme">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <span class="status-dot" :class="connected ? 'on' : 'off'"
            :title="connected ? 'live updates connected' : 'live updates disconnected'"></span>
    </div>
  </header>
    <template x-if="!loaded"><div class="loading t-body-md">Loading&hellip;</div></template>
    <div class="board columns" x-show="loaded">
      <template x-for="col in columns" :key="col">
        <section class="column">
          <header class="column-header">
            <span class="column-name t-list-title" x-text="col"></span>
            <span class="column-count t-mono-counter" x-text="cardsByColumn(col).length"></span>
          </header>
          <ul class="cards" :data-column="col">
            <template x-for="card in filteredCardsByColumn(col)" :key="card.id">
              <li class="card" :data-card-id="card.id" :class="card.priority ? 'priority-' + card.priority : ''" :title="'updated ' + card.updated_at" @click="openCard(card)">
                <div class="card-title t-card-text" x-text="card.title"></div>
                <template x-if="card.priority">
                  <span class="badge t-mono-label" x-text="card.priority"></span>
                </template>
                <ul class="tags" x-show="card.tags && card.tags.length">
                  <template x-for="tag in (card.tags || [])" :key="tag">
                    <li class="tag t-tag" x-text="tag"></li>
                  </template>
                </ul>
                <button type="button" class="card-delete" aria-label="Delete card" @click="deleteCard(card.id, $event)">&times;</button>
              </li>
            </template>
            <template x-if="cardsByColumn(col).length === 0">
              <li class="empty t-body-md">empty</li>
            </template>
            <template x-if="filter !== '' && cardsByColumn(col).length > 0 && filteredCardsByColumn(col).length === 0">
              <li class="no-matches t-body-md">No matches</li>
            </template>
          </ul>
          <div class="column-footer"
               x-data="{ composing: false, draft: '', error: '', submitting: false,
                         openComposer() { this.composing = true; this.draft = ''; this.error = ''; },
                         cancelComposer() { this.composing = false; this.draft = ''; this.error = ''; },
                         async submitComposer() {
                           const title = (this.draft || '').trim();
                           if (!title) { this.cancelComposer(); return; }
                           this.submitting = true; this.error = '';
                           try {
                             const res = await fetch('/api/cards', {
                               method: 'POST',
                               headers: {'Content-Type': 'application/json'},
                               body: JSON.stringify({ column: col, title: title })
                             });
                             if (!res.ok) {
                               const err = await res.json().catch(() => ({}));
                               this.error = (err && err.error && err.error.message) || ('HTTP ' + res.status);
                               this.submitting = false;
                               return;
                             }
                             this.composing = false; this.draft = ''; this.submitting = false;
                           } catch (e) {
                             this.error = e.message || String(e);
                             this.submitting = false;
                           }
                         } }">
            <button x-show="!composing"
                    type="button"
                    class="button-ghost composer-open"
                    @click="openComposer()">+ Add a card</button>
            <form x-show="composing"
                  class="composer"
                  @submit.prevent="submitComposer()">
              <textarea x-model="draft"
                        x-ref="composerInput"
                        x-init="$watch('composing', v => v && $nextTick(() => $refs.composerInput.focus()))"
                        rows="2"
                        placeholder="Enter a title&hellip;"
                        @keydown.enter.prevent="submitComposer()"
                        @keydown.escape="cancelComposer()"
                        @blur="if (!$event.relatedTarget || !$event.relatedTarget.closest('.composer')) cancelComposer()"
                        :disabled="submitting"></textarea>
              <div class="composer-actions">
                <button type="submit"
                        class="button-primary"
                        :disabled="submitting"
                        x-text="submitting ? 'Adding…' : 'Add'"></button>
                <button type="button"
                        class="button-ghost"
                        @click="cancelComposer()">Cancel</button>
              </div>
              <p class="composer-error" x-show="error" x-text="error"></p>
            </form>
          </div>
        </section>
      </template>
    </div>
    <div class="modal-overlay"
         x-show="editing"
         x-cloak
         @keydown.escape.window="closeCard()"
         @click.self="closeCard()">
      <div class="modal" role="dialog" aria-modal="true" x-show="editing">
        <header class="modal-header">
          <h2 class="t-list-title">Edit card</h2>
          <span class="modal-id" x-text="draft && draft.id"></span>
        </header>
        <form @submit.prevent="saveCard()" x-show="draft">
          <label>Title
            <input type="text" x-model="draft.title" required
                   @keydown.enter.prevent="saveCard()">
          </label>
          <label>Description
            <textarea x-model="draft.description" rows="6"
                      @keydown.meta.enter.prevent="saveCard()"
                      @keydown.ctrl.enter.prevent="saveCard()"></textarea>
          </label>
          <label>Priority
            <select x-model="draft.priority">
              <option value="">no priority</option>
              <template x-for="p in priorities" :key="p">
                <option :value="p" x-text="p"></option>
              </template>
            </select>
          </label>
          <fieldset class="tags-field">
            <legend>Tags</legend>
            <ul class="tag-chips">
              <template x-for="t in draft.tags" :key="t">
                <li class="tag t-tag">
                  <span x-text="t"></span>
                  <button type="button" @click="removeTag(t)" aria-label="remove tag">&times;</button>
                </li>
              </template>
            </ul>
            <input type="text" x-model="tagInput"
                   @keydown.enter.prevent="addTag()"
                   @keydown.comma.prevent="addTag()"
                   placeholder="add tag, press Enter">
          </fieldset>
          <p class="modal-error" x-show="error" x-text="error"></p>
          <div class="modal-readonly">
            <span>column: <code x-text="draft.column"></code></span>
            <span>created: <code x-text="draft.created_at"></code></span>
            <span>updated: <code x-text="draft.updated_at"></code></span>
          </div>
          <footer class="modal-footer">
            <button type="button" class="t-button" @click="closeCard()">Cancel</button>
            <button type="submit" class="t-button">Save</button>
          </footer>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
