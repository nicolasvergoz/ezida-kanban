<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Kanban</title>
  <link rel="stylesheet" href="/static/style.css">
  <script defer src="/static/app.js"></script>
  <script defer src="/static/vendor/alpine.min.js"></script>
  <script defer src="/static/vendor/sortable.min.js"></script>
</head>
<body>
  <main x-data="board()" x-init="init(); initTheme(); load()">
  <header class="topbar">
    <span class="brand t-brand" x-text="project_name">Ezida</span>
    <div class="topbar-right">
      <div class="filter-wrap">
        <button type="button"
                class="topbar-btn filter-btn"
                :class="{ 'state-active': filter !== '' }"
                @click="filterOpen ? (filterOpen = false) : openFilter()"
                aria-label="Filter cards">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <span>Filter</span>
          <span class="t-mono-counter filter-badge"
                x-show="filter.trim() !== ''"
                x-text="cards.filter(c => filterMatches(c)).length"></span>
        </button>
        <div class="filter-popover"
             x-show="filterOpen"
             x-cloak
             @click.outside="filterOpen = false"
             @keydown.escape.window="filterOpen = false">
          <label class="t-mono-label" for="filter-input">FILTER CARDS</label>
          <input id="filter-input"
                 type="text"
                 x-ref="filterInput"
                 x-model="filter"
                 placeholder="Type to filter...">
          <a class="clear-link"
             href="#"
             x-show="filter !== ''"
             @click.prevent="filter = ''">Clear filter</a>
        </div>
      </div>
      <div class="theme-toggle" role="group" aria-label="Theme">
        <button type="button"
                data-theme-choice="light"
                :aria-pressed="theme === 'light'"
                @click="setTheme('light')"
                title="Light theme">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </button>
        <button type="button"
                data-theme-choice="system"
                :aria-pressed="theme === 'system'"
                @click="setTheme('system')"
                title="System theme">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
        </button>
        <button type="button"
                data-theme-choice="dark"
                :aria-pressed="theme === 'dark'"
                @click="setTheme('dark')"
                title="Dark theme">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <span class="status-dot" :class="connected ? 'on' : 'off'"
            :title="connected ? 'live updates connected' : 'live updates disconnected'"></span>
    </div>
  </header>
    <template x-if="!loaded"><div class="loading t-body-md">Loading&hellip;</div></template>
    <div class="board columns" x-show="loaded">
      <template x-for="col in columns" :key="col">
        <section class="column" :data-column="col">
          <header class="column-header list-header"
                  :class="renamingColumn === col ? 'is-renaming' : ''">
            <span class="column-name t-list-title"
                  x-show="renamingColumn !== col"
                  @click="startRename(col); const _inp = $event.target.parentElement.querySelector('.column-name--input'); $nextTick(() => { _inp.focus(); _inp.select(); })"
                  x-text="col"></span>
            <input class="column-name column-name--input t-list-title"
                   type="text"
                   x-show="renamingColumn === col"
                   x-model="renameDraft"
                   @keydown.enter.prevent="commitRename()"
                   @keydown.escape.prevent="cancelRename()"
                   @blur="commitRename()">
            <span class="rename-error" x-show="renameError && renamingColumn === col" x-text="renameError"></span>
            <span class="column-count t-mono-counter" x-text="cardsByColumn(col).length"></span>
            <button type="button"
                    class="list-menu-btn"
                    @click.stop="toggleListMenu(col)"
                    :aria-expanded="openMenuColumn === col"
                    aria-label="List actions">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
            </button>
            <div class="list-menu"
                 x-show="openMenuColumn === col"
                 x-cloak
                 @click.outside="closeListMenu()"
                 @keydown.escape.window="closeListMenu()">
              <button type="button"
                      class="menu-item danger"
                      @click="deleteList(col)">Delete list</button>
              <p class="menu-error" x-show="menuError" x-text="menuError"></p>
            </div>
          </header>
          <ul class="cards" :data-column="col">
            <template x-for="card in filteredCardsByColumn(col)" :key="card.id">
              <li class="card" :data-card-id="card.id" :class="card.priority ? 'priority-' + card.priority : ''" :title="'updated ' + card.updated_at" @click="openCard(card)">
                <span class="card-id-wrap">
                  <span class="card-id" x-text="card.id" @click.stop="copyId(card.id, $event, 'card')" @mousedown.stop title="Click to copy card ID"></span>
                  <span class="card-id-copied" x-show="copiedCardId === card.id" x-transition.opacity.duration.150ms>copied</span>
                </span>
                <div class="card-title t-card-text" x-text="card.title"></div>
                <ul class="card-meta"
                    x-show="card.priority || (card.description && card.description.trim() !== '') || (card.tags && card.tags.length)">
                  <template x-if="card.priority">
                    <li class="card-priority-dot"
                        :style="priorityColors[card.priority] ? ('background-color:' + priorityColors[card.priority]) : ''"
                        :title="card.priority"
                        :aria-label="'priority ' + card.priority"></li>
                  </template>
                  <li x-show="card.description && card.description.trim() !== ''"
                      class="card-meta-icon">
                    <svg class="card-desc-icon" viewBox="0 0 16 16" width="14" height="14"
                         fill="none" stroke="currentColor" stroke-width="1.5"
                         stroke-linecap="round" aria-label="Has description">
                      <title>Has description</title>
                      <line x1="3" y1="5" x2="13" y2="5"/>
                      <line x1="3" y1="8" x2="13" y2="8"/>
                      <line x1="3" y1="11" x2="10" y2="11"/>
                    </svg>
                  </li>
                  <template x-for="tag in (card.tags || [])" :key="tag">
                    <li class="tag t-tag" x-text="tag"></li>
                  </template>
                </ul>
                <button type="button" class="card-delete" aria-label="Delete card" @click="deleteCard(card.id, $event)">&times;</button>
              </li>
            </template>
            <template x-if="cardsByColumn(col).length === 0">
              <li class="empty t-body-md">empty</li>
            </template>
            <template x-if="filter !== '' && cardsByColumn(col).length > 0 && filteredCardsByColumn(col).length === 0">
              <li class="no-matches t-body-md">No matches</li>
            </template>
          </ul>
          <div class="column-footer"
               x-data="{ composing: false, draft: '', error: '', submitting: false,
                         openComposer() { this.composing = true; this.draft = ''; this.error = ''; },
                         cancelComposer() { this.composing = false; this.draft = ''; this.error = ''; },
                         async submitComposer() {
                           const title = (this.draft || '').trim();
                           if (!title) { this.cancelComposer(); return; }
                           this.submitting = true; this.error = '';
                           try {
                             $root._lastSelfWriteAt = Date.now();
                             const res = await fetch('/api/cards', {
                               method: 'POST',
                               headers: {'Content-Type': 'application/json'},
                               body: JSON.stringify({ column: col, title: title })
                             });
                             if (!res.ok) {
                               const err = await res.json().catch(() => ({}));
                               this.error = (err && err.error && err.error.message) || ('HTTP ' + res.status);
                               this.submitting = false;
                               return;
                             }
                             this.composing = false; this.draft = ''; this.submitting = false;
                           } catch (e) {
                             this.error = e.message || String(e);
                             this.submitting = false;
                           }
                         } }">
            <button x-show="!composing"
                    type="button"
                    class="button-ghost composer-open"
                    @click="openComposer(); $nextTick(() => $refs.composerInput.focus())">+ Add a card</button>
            <form x-show="composing"
                  class="composer"
                  @submit.prevent="submitComposer()">
              <textarea x-model="draft"
                        x-ref="composerInput"
                        rows="2"
                        placeholder="Enter a title&hellip;"
                        @keydown.enter.prevent="submitComposer()"
                        @keydown.escape="cancelComposer()"
                        @blur="if (!$event.relatedTarget || !$event.relatedTarget.closest('.composer')) cancelComposer()"
                        :disabled="submitting"></textarea>
              <div class="composer-actions">
                <button type="submit"
                        class="button-primary"
                        @mousedown.prevent
                        :disabled="submitting"
                        x-text="submitting ? 'Adding…' : 'Add'"></button>
                <button type="button"
                        class="button-ghost"
                        @mousedown.prevent
                        @click="cancelComposer()">Cancel</button>
              </div>
              <p class="composer-error" x-show="error" x-text="error"></p>
            </form>
          </div>
        </section>
      </template>
      <button type="button"
              class="add-list-placeholder"
              x-show="!composingList"
              @click="openListComposer(); $nextTick(() => $refs.listInput.focus())">+ Add list</button>
      <div class="list-composer"
           x-show="composingList"
           x-cloak>
        <input type="text"
               x-ref="listInput"
               x-model="listDraft"
               placeholder="List name"
               @keydown.enter.prevent="submitNewList()"
               @keydown.escape.prevent="cancelNewList()">
        <div class="composer-actions">
          <button type="button" class="button-primary" @mousedown.prevent @click="submitNewList()">Add</button>
          <button type="button" class="button-ghost" @mousedown.prevent @click="cancelNewList()">Cancel</button>
        </div>
        <p class="composer-error" x-show="listError" x-text="listError"></p>
      </div>
    </div>
    <div class="modal-overlay"
         x-show="open"
         x-cloak
         @keydown.escape.window="onEscape()"
         @click.self="closeModal()">
      <div class="modal" role="dialog" aria-modal="true" x-show="open">
        <template x-if="openCardData">
          <div>
            <header class="modal-header">
              <div class="modal-id-group">
                <span class="modal-id t-mono-label" x-text="openCardData.id" @click="copyId(openCardData.id, $event, 'modal')" title="Click to copy card ID"></span>
                <span class="modal-id-copied" x-show="copiedModalId" x-transition.opacity.duration.150ms>copied</span>
              </div>
              <div class="modal-actions">
                <button type="button"
                        class="modal-action danger"
                        @click="confirmDeleteCardFromModal()"
                        title="Delete this card"
                        aria-label="Delete this card">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
                       stroke="currentColor" stroke-width="1.6"
                       stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/>
                    <path d="M10 11v6M14 11v6"/>
                    <path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/>
                  </svg>
                </button>
                <button type="button"
                        class="modal-action"
                        @click="closeModal()"
                        title="Close"
                        aria-label="Close">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
                       stroke="currentColor" stroke-width="1.8"
                       stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="6" y1="6" x2="18" y2="18"/>
                    <line x1="6" y1="18" x2="18" y2="6"/>
                  </svg>
                </button>
              </div>
            </header>

            <div class="modal-body">

              <!-- Title field -->
              <div class="modal-section">
                <span class="modal-label t-mono-label">Title</span>
                <div class="field-row field-row--title">
                  <span class="field field--title"
                        x-show="!editing.title"
                        @click="startEdit('title')"
                        title="Click to edit"
                        x-text="openCardData.title"></span>
                  <input type="text"
                         class="field--input field--input-title"
                         :class="{ 'field--saving': saving.title }"
                         x-show="editing.title"
                         x-model="drafts.title"
                         x-ref="titleInput"
                         @blur="commitField('title')"
                         @keydown.enter.prevent="commitField('title')"
                         @keydown.escape.stop.prevent="revertField('title')">
                  <p class="field-error" x-show="errors.title" x-text="errors.title"></p>
                </div>
              </div>

              <!-- Priority + Column meta grid -->
              <div class="modal-meta">

                <!-- Priority -->
                <div class="modal-section">
                  <span class="modal-label t-mono-label">Priority</span>
                  <div class="field-row field-row--priority"
                       @click.outside="prioOpen = false">
                    <button type="button"
                            class="field field--chip modal-prio"
                            :class="{ 'field--saving': saving.priority }"
                            @click="togglePrio()"
                            aria-haspopup="listbox"
                            :aria-expanded="prioOpen ? 'true' : 'false'"
                            title="Click to change priority">
                      <span class="prio-dot"
                            :style="openCardData.priority && priorityColors[openCardData.priority] ? ('background: ' + priorityColors[openCardData.priority]) : ''"
                            aria-hidden="true"></span>
                      <span class="field--chip-text" x-text="openCardData.priority || 'no priority'"></span>
                      <svg class="field--chip-caret" viewBox="0 0 24 24" width="12" height="12" fill="none"
                           stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                           stroke-linejoin="round" aria-hidden="true">
                        <polyline points="6 9 12 15 18 9"/>
                      </svg>
                    </button>
                    <ul class="modal-dropdown" role="listbox" x-show="prioOpen" x-cloak x-transition.opacity.duration.120ms>
                      <li role="option" :aria-selected="!openCardData.priority">
                        <button type="button"
                                class="modal-dropdown-item"
                                :class="{ selected: !openCardData.priority }"
                                @click="setPriorityValue('')">
                          <span class="prio-dot" aria-hidden="true"></span>
                          <span class="modal-dropdown-label">no priority</span>
                          <svg class="modal-dropdown-check" x-show="!openCardData.priority" viewBox="0 0 24 24" width="12" height="12" fill="none"
                               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="20 6 9 17 4 12"/>
                          </svg>
                        </button>
                      </li>
                      <template x-for="p in priorities" :key="p">
                        <li role="option" :aria-selected="openCardData.priority === p">
                          <button type="button"
                                  class="modal-dropdown-item"
                                  :class="{ selected: openCardData.priority === p }"
                                  @click="setPriorityValue(p)">
                            <span class="prio-dot"
                                  :style="priorityColors[p] ? ('background: ' + priorityColors[p]) : ''"
                                  aria-hidden="true"></span>
                            <span class="modal-dropdown-label" x-text="p"></span>
                            <svg class="modal-dropdown-check" x-show="openCardData.priority === p" viewBox="0 0 24 24" width="12" height="12" fill="none"
                                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                              <polyline points="20 6 9 17 4 12"/>
                            </svg>
                          </button>
                        </li>
                      </template>
                    </ul>
                    <p class="field-error" x-show="errors.priority" x-text="errors.priority"></p>
                  </div>
                </div>

                <!-- Column -->
                <div class="modal-section">
                  <span class="modal-label t-mono-label">Column</span>
                  <div class="field-row field-row--column"
                       @click.outside="colOpen = false">
                    <button type="button"
                            class="field field--chip modal-col"
                            :class="{ 'field--saving': saving.column }"
                            @click="toggleCol()"
                            aria-haspopup="listbox"
                            :aria-expanded="colOpen ? 'true' : 'false'"
                            title="Click to move to another column">
                      <svg class="field--chip-icon" viewBox="0 0 24 24" width="13" height="13" fill="none"
                           stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                           stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="4" width="5" height="16" rx="1"/>
                        <rect x="10" y="4" width="5" height="10" rx="1"/>
                        <rect x="17" y="4" width="4" height="7" rx="1"/>
                      </svg>
                      <span class="field--chip-text" x-text="openCardData.column"></span>
                      <svg class="field--chip-caret" viewBox="0 0 24 24" width="12" height="12" fill="none"
                           stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                           stroke-linejoin="round" aria-hidden="true">
                        <polyline points="6 9 12 15 18 9"/>
                      </svg>
                    </button>
                    <ul class="modal-dropdown" role="listbox" x-show="colOpen" x-cloak x-transition.opacity.duration.120ms>
                      <template x-for="c in columns" :key="c">
                        <li role="option" :aria-selected="openCardData.column === c">
                          <button type="button"
                                  class="modal-dropdown-item"
                                  :class="{ selected: openCardData.column === c }"
                                  @click="setColumnValue(c)">
                            <span class="col-tick" aria-hidden="true"></span>
                            <span class="modal-dropdown-label" x-text="c"></span>
                            <svg class="modal-dropdown-check" x-show="openCardData.column === c" viewBox="0 0 24 24" width="12" height="12" fill="none"
                                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                              <polyline points="20 6 9 17 4 12"/>
                            </svg>
                          </button>
                        </li>
                      </template>
                    </ul>
                    <p class="field-error" x-show="errors.column" x-text="errors.column"></p>
                  </div>
                </div>
              </div>

              <!-- Description field -->
              <div class="modal-section">
                <span class="modal-label t-mono-label">Description</span>
                <div class="field-row field-row--description">
                  <p class="field field--multiline"
                     :class="{ 'field--empty': !openCardData.description }"
                     x-show="!editing.description"
                     @click="startEdit('description')"
                     title="Click to edit"
                     x-text="openCardData.description || 'Add a description'"></p>
                  <textarea class="field--textarea"
                            :class="{ 'field--saving': saving.description }"
                            x-show="editing.description"
                            x-model="drafts.description"
                            x-ref="descriptionInput"
                            rows="6"
                            placeholder="Add a description"
                            @blur="commitField('description')"
                            @keydown.meta.enter.prevent="commitField('description')"
                            @keydown.ctrl.enter.prevent="commitField('description')"
                            @keydown.escape.stop.prevent="revertField('description')"></textarea>
                  <p class="field-error" x-show="errors.description" x-text="errors.description"></p>
                </div>
              </div>

              <!-- Tag chips (always live, no rendered-vs-editing split) -->
              <div class="modal-section">
                <span class="modal-label t-mono-label">Tags</span>
                <div class="field-row field-row--tags">
                  <ul class="tag-chips" :class="{ 'field--saving': saving.tags }">
                    <template x-for="t in openCardData.tags" :key="t">
                      <li class="tag t-tag modal-tag-chip">
                        <span x-text="t"></span>
                        <button type="button" @click="removeTag(t)" aria-label="remove tag">&times;</button>
                      </li>
                    </template>
                    <li class="modal-tag-add-wrap">
                      <button type="button"
                              class="modal-tag-add"
                              x-show="!tagAdding"
                              @click="startAddTag()"
                              title="Add a tag">
                        <svg viewBox="0 0 24 24" width="11" height="11" fill="none"
                             stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                          <line x1="12" y1="5" x2="12" y2="19"/>
                          <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        <span>Add</span>
                      </button>
                      <input type="text"
                             class="modal-tag-input"
                             x-show="tagAdding"
                             x-ref="tagAddInput"
                             x-model="tagInput"
                             maxlength="40"
                             placeholder="new tag…"
                             @blur="commitNewTag()"
                             @keydown.enter.prevent="commitNewTag()"
                             @keydown.comma.prevent="commitNewTag()"
                             @keydown.escape.stop.prevent="cancelAddTag()">
                    </li>
                  </ul>
                  <p class="field-error" x-show="errors.tags" x-text="errors.tags"></p>
                </div>
              </div>

            </div>

            <!-- Read-only footer -->
            <footer class="modal-foot">
              <div class="modal-foot-item">
                <span class="modal-foot-label t-mono-label">Created</span>
                <span class="modal-foot-value"
                      :title="formatAbsolute(openCardData.created_at)"
                      x-text="formatRelative(openCardData.created_at)"></span>
              </div>
              <span class="modal-foot-sep" aria-hidden="true"></span>
              <div class="modal-foot-item">
                <span class="modal-foot-label t-mono-label">Updated</span>
                <span class="modal-foot-value"
                      :title="formatAbsolute(openCardData.updated_at)"
                      x-text="formatRelative(openCardData.updated_at)"></span>
              </div>
            </footer>
          </div>
        </template>
      </div>
    </div>
  </main>
</body>
</html>
