[[cards]]
id = '5u7lsw'
title = 'Polish card detail modal layout'
column = 'done'
description = "Modal is flat: no section labels, fields look passive, priority does not look interactive. Improve hierarchy and affordance.\n\n- Add small uppercase section labels (Title, Description, Priority, Tags) above each field-row so users know what they are editing.\n- Priority: replace the plain 'no priority' span with a clearly clickable control (chip / dropdown trigger with caret + colored dot per priority) so the interaction is discoverable without first click.\n- Description: show a pencil/edit icon hint on hover; placeholder 'Add a description' should look like an empty-state, not a value.\n- Tags: keep chip + add-input but pad spacing and align with the rest.\n- Read-only footer: tighten typography, group column/created/updated with subtle separators.\n- Title: slightly bigger, with edit hint on hover.\n\nGoal: detail modal feels structured and interactive on first glance, no guessing what is editable."
created_at = 2026-05-23T09:12:34Z
updated_at = 2026-05-28T11:53:30Z
tags = ['viewer', 'ux']
priority = 'high'

