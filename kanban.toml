[[cards]]
id = 'f20wbo'
title = 'Card dependencies'
column = 'backlog'
description = "Allow a card to declare dependencies on other cards (blocked-by / blocks). CLI: ezida edit <id> --depends-on <id>,<id> (and --no-depends-on to clear). Viewer: show linked cards in the detail modal with their status, and a small badge on the card when it has unmet dependencies (deps not in 'done'). Goal: surface blocking relationships so the board reflects what is actually actionable now."
created_at = 2026-05-23T09:09:28Z
updated_at = 2026-05-23T09:10:22Z
tags = ['cli', 'viewer', 'schema']
priority = 'medium'

[[cards]]
id = 'wrshlo'
title = 'Card due dates'
column = 'backlog'
description = "Add an optional due date field to cards. CLI: ezida edit <id> --due 2026-06-01 (and --no-due to clear). Viewer: show the date on the card and in the detail modal; visually highlight overdue (past today, not in 'done') and due-soon (within N days). Filter/sort by due date. Goal: make time-bound work visible at a glance."
created_at = 2026-05-23T09:09:28Z
updated_at = 2026-05-23T09:10:22Z
tags = ['cli', 'viewer', 'schema']
