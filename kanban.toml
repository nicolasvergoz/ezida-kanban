schema_version = 1

[board]
columns = ['backlog', 'todo', 'ongoing', 'done']
priorities = ['low', 'medium', 'high']

[board.priority_colors]
high = '#ef4444'
low = '#22c55e'
medium = '#f59e0b'

[[cards]]
id = 'r0kn99'
title = 'Windows support'
column = 'backlog'
description = "Verify and document Windows compatibility for ezida CLI + viewer: path handling, file locking, browser auto-open ('start' instead of 'open'/'xdg-open'), install script, build artifacts."
