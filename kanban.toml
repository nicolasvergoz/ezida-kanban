description = 'Card detail modal already shows the card ID via .modal-id (t-mono-label style). Reuse same look on the card itself: small grey monospace ID above the title in the web viewer — but use a smaller font size than the modal version, since the card title is smaller than the modal title and the ID must stay visually subordinate to it. Click on the ID (both on the card and in the detail modal) copies it to the clipboard. Goal: easier to interact with AIs or manipulate a specific card via its ID (e.g. ezida get <id>, ezida move <id>).'
