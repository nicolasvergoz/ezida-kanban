[[cards]]
id = 'e0tf0t'
title = 'Static demo viewer on GitHub Pages'
column = 'done'
description = "Static, in-memory demo of the viewer at /demo/, populated from a fresh snapshot of Ezida's own kanban.toml regenerated by CI on every Pages deploy.\n\nImplementation:\n- ezida export --json command emits the same JSON envelope as GET /api/board.\n- site/demo/{index.html, demo-shim.js} + symlinks to internal/server/web/{app.js,style.css,vendor}.\n- demo-shim.js monkey-patches fetch + EventSource: routes /api/* against in-memory state, fires board-changed after each mutation.\n- Drag, edit, rename, add column — all work in-memory; F5 resets.\n- pages.yml: go build → ezida export > board.json → sed snapshot SHA into banner.\n- Landing links: nav top, hero CTA, #webui, #roadmap."
created_at = 2026-05-23T08:20:41Z
updated_at = 2026-05-23T08:57:59Z
tags = ['branding', 'demo']
priority = 'medium'

