<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ezida — Live demo</title>
  <meta name="description" content="In-memory demo of the Ezida viewer. Changes don't persist.">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    .demo-banner {
      position: sticky;
      top: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px 14px;
      font-family: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      letter-spacing: 0.03em;
      color: oklch(0.32 0.04 35);
      background: oklch(0.93 0.04 35);
      border-bottom: 1px solid oklch(0.78 0.06 35);
    }
    .demo-banner a {
      color: oklch(0.42 0.13 35);
      border-bottom: 1px solid oklch(0.42 0.13 35 / 0.4);
    }
    .demo-banner a:hover { border-bottom-color: oklch(0.42 0.13 35); }
    [data-theme="dark"] .demo-banner {
      color: oklch(0.86 0.06 35);
      background: oklch(0.22 0.05 35);
      border-bottom-color: oklch(0.34 0.08 35);
    }
  </style>
</head>
<body>
  <div class="demo-banner">
    <span>Live demo · snapshot <code>__SNAPSHOT_SHA__</code> · changes don't persist</span>
    <a href="../">← Back to ezida-kanban</a>
  </div>

  <div id="root"></div>

  <!-- demo-shim patches fetch + EventSource BEFORE the React app loads -->
  <script src="demo-shim.js"></script>
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
